<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acessórios — Rocha Firme Moda</title>
<meta name="description" content="Acessórios Rocha Firme Moda: Cintos, brincos, óculos e lenços — os detalhes que assinam a produção. Compre pelo WhatsApp.">
<link rel="stylesheet" href="style.css">
</head>
<body>


<div id="site-header"></div>

<p class="breadcrumb"><a href="index.html">Início</a> / Acessórios</p>

<section class="cat-hero">
  <div class="cat-hero-inner">
    <div>
      <p class="eyebrow">Categoria</p>
      <h1>Acessórios</h1>
      <p>Cintos, brincos, óculos e lenços — os detalhes que assinam a produção.</p>
    </div>
    <svg class="cat-hero-icon"><use href="icons.svg#ic-acessorio"></use></svg>
  </div>
</section>

<section class="section">
  <div class="filters">
    <span class="filters-label">Tamanho:</span>
    <button data-filter-size="Único">Único</button>
  </div>
  <div class="filters">
    <span class="filters-label">Cor:</span>
    <button data-filter-color="marrom">Marrom Couro</button>
    <button data-filter-color="preto">Preto</button>
    <button data-filter-color="dourado">Dourado</button>
    <button data-filter-color="terracota">Terracota</button>
    <button data-filter-color="areia">Areia</button>
  </div>
  <div class="product-grid" id="grid"></div>
</section>

<section class="cta-strip">
  <p class="eyebrow" style="justify-content:center;color:#f2ddd6">Não achou o tamanho?</p>
  <h2 class="reveal">A gente confirma estoque e te ajuda a escolher o caimento certo.</h2>
  <a class="btn" data-whats="Olá! Estou vendo a categoria Acessórios no site e preciso de ajuda para escolher.">Chamar no WhatsApp</a>
</section>

<div id="site-footer"></div>

<script src="main.js"></script>
<script src="layout.js"></script>
<script src="products.js"></script>
<script>
  mountLayout('acessorios');
  initCategoryPage('acessorios', 'grid');
</script>
</body>
</html>
